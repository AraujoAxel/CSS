<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Ejercicio 4</title>

    <style>
        .subrayado {
            color: green;
            text-decoration: underline;
        }

        .tachado {
            color: green;
            text-decoration: line-through;
        }
    </style>

</head>

<body>

    <h2>Ejercicio 4</h2>

    <h1 class="subrayado">
        Título Subrayado
    </h1>

    <p>
        Esta palabra está
        <span class="subrayado">subrayada</span>
        y esta palabra está
        <span class="tachado">tachada</span>.
    </p>

</body>

</html>
